<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Forest Bagging — Step by Step</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Baskerville:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b1222;
    color: #d8dce6;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 30px 20px 100px;
  }

  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.6rem;
    color: #64b5f6;
    margin-bottom: 4px;
  }

  .tagline {
    color: #5a6a80;
    font-size: 0.8rem;
    margin-bottom: 30px;
  }

  /* Progress bar */
  .progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 30px;
  }

  .progress-pip {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: #1a2640;
    transition: background 0.3s;
  }

  .progress-pip.done { background: #64b5f6; }

  .progress-pip.current {
    background: #42a5f5;
    box-shadow: 0 0 8px rgba(66, 165, 245, 0.5);
  }

  /* Step card */
  .step-card {
    background: #0f1b2e;
    border: 1px solid #1a2640;
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    display: inline-block;
    background: #42a5f5;
    color: #0b1222;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  .step-card h2 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.15rem;
    color: #64b5f6;
    margin-bottom: 16px;
    font-weight: 400;
  }

  .step-card p {
    color: #7a8da6;
    font-size: 0.82rem;
    margin-bottom: 14px;
    line-height: 1.8;
  }

  .step-card p strong { color: #d8dce6; }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 0.8rem;
  }

  th {
    background: #0b1222;
    color: #5a6a80;
    padding: 10px 10px;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #1a2640;
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid #141e33;
  }

  .yes { color: #ef5350; font-weight: 600; }
  .no { color: #66bb6a; font-weight: 600; }
  .pred { color: #64b5f6; font-weight: 500; }
  .dim { color: #4a5a70; }
  .picked { background: rgba(100, 181, 246, 0.08); }
  .not-picked { opacity: 0.35; }

  /* Callout */
  .callout {
    background: rgba(100, 181, 246, 0.06);
    border-left: 3px solid #42a5f5;
    padding: 14px 18px;
    border-radius: 0 10px 10px 0;
    font-size: 0.82rem;
    color: #9aafc6;
    margin: 18px 0;
    line-height: 1.8;
  }

  .callout strong { color: #64b5f6; }

  .callout.orange {
    background: rgba(255, 167, 38, 0.06);
    border-left-color: #ffa726;
  }
  .callout.orange strong { color: #ffa726; }

  .callout.green {
    background: rgba(102, 187, 106, 0.06);
    border-left-color: #66bb6a;
  }
  .callout.green strong { color: #66bb6a; }

  .callout.purple {
    background: rgba(171, 130, 255, 0.06);
    border-left-color: #ab82ff;
  }
  .callout.purple strong { color: #ab82ff; }

  /* Formula */
  .formula {
    background: #080e1a;
    border: 1px solid #1a2640;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin: 14px 0;
    color: #d8dce6;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .formula .val { color: #64b5f6; font-weight: 600; }
  .formula .op { color: #5a6a80; }

  /* Tree diagram */
  .tree-wrap {
    background: #080e1a;
    border: 1px dashed #1a2640;
    border-radius: 12px;
    padding: 20px 10px;
    margin: 18px 0;
    text-align: center;
    overflow-x: auto;
  }

  /* Bootstrap bag visual */
  .bag-visual {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 14px 0;
  }

  .bag-chip {
    background: #1a2640;
    border: 1px solid #243350;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.78rem;
    color: #9aafc6;
    transition: all 0.2s;
  }

  .bag-chip.in-bag {
    background: rgba(100, 181, 246, 0.1);
    border-color: #42a5f5;
    color: #64b5f6;
    font-weight: 500;
  }

  .bag-chip.duplicate {
    background: rgba(255, 167, 38, 0.1);
    border-color: #ffa726;
    color: #ffa726;
    font-weight: 500;
  }

  .bag-chip.left-out {
    opacity: 0.3;
    text-decoration: line-through;
  }

  /* Side by side trees */
  .trees-row {
    display: flex;
    gap: 16px;
    margin: 18px 0;
    flex-wrap: wrap;
  }

  .tree-panel {
    flex: 1;
    min-width: 220px;
    background: #080e1a;
    border: 1px solid #1a2640;
    border-radius: 12px;
    padding: 16px;
  }

  .tree-panel-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
  }

  .t1-color { color: #42a5f5; }
  .t2-color { color: #ab82ff; }
  .t3-color { color: #ffa726; }

  /* Vote visual */
  .vote-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 0.8rem;
  }

  .vote-name {
    width: 65px;
    text-align: right;
    color: #5a6a80;
    flex-shrink: 0;
  }

  .vote-boxes {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .vote-box {
    width: 50px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .vote-yes {
    background: rgba(239, 83, 80, 0.15);
    border: 1px solid #ef5350;
    color: #ef5350;
  }

  .vote-no {
    background: rgba(102, 187, 106, 0.15);
    border: 1px solid #66bb6a;
    color: #66bb6a;
  }

  .vote-result {
    width: 70px;
    font-weight: 600;
    flex-shrink: 0;
    text-align: center;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.78rem;
  }

  .vote-result.correct {
    background: rgba(102, 187, 106, 0.12);
    color: #66bb6a;
  }

  .vote-result.wrong {
    background: rgba(239, 83, 80, 0.12);
    color: #ef5350;
  }

  /* Comparison box */
  .vs-box {
    display: flex;
    gap: 20px;
    margin: 18px 0;
    flex-wrap: wrap;
  }

  .vs-side {
    flex: 1;
    min-width: 200px;
    background: #080e1a;
    border: 1px solid #1a2640;
    border-radius: 12px;
    padding: 18px;
  }

  .vs-side h3 {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 12px;
  }

  .vs-side ul {
    list-style: none;
    font-size: 0.78rem;
    color: #7a8da6;
    line-height: 2;
  }

  .vs-side ul li::before {
    content: '→ ';
    color: #3a4a60;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .nav-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-back {
    background: #1a2640;
    color: #7a8da6;
  }

  .btn-back:hover:not(:disabled) { background: #243350; }

  .btn-next {
    background: #42a5f5;
    color: #0b1222;
  }

  .btn-next:hover:not(:disabled) { background: #64b5f6; }

  .step-count {
    color: #5a6a80;
    font-size: 0.8rem;
  }

  @media (max-width: 600px) {
    .app { padding: 20px 14px 80px; }
    .step-card { padding: 22px 18px; }
    h1 { font-size: 1.3rem; }
    .trees-row { flex-direction: column; }
    .vs-box { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Random Forest, Step by Step</h1>
  <p class="tagline">5 patients · 3 trees · bagging explained with every detail</p>

  <div class="progress-bar" id="progressBar"></div>
  <div id="stepContent"></div>

  <div class="nav">
    <button class="nav-btn btn-back" id="btnBack" onclick="goBack()">← Back</button>
    <span class="step-count" id="stepCount"></span>
    <button class="nav-btn btn-next" id="btnNext" onclick="goNext()">Next →</button>
  </div>
</div>

<script>
const STEPS = [

  // 0 — THE DATA
  {
    label: "THE DATA",
    title: "Same 5 patients",
    html: `
      <p>Same setup as before. <strong>One feature</strong> (blood pressure), <strong>one label</strong> (heart attack: 1 = yes, 0 = no).</p>
      <table>
        <tr><th>Patient</th><th>Blood Pressure</th><th>Heart Attack?</th><th>Label (y)</th></tr>
        <tr><td>🧑 Alice</td><td>110</td><td class="no">No</td><td>0</td></tr>
        <tr><td>👨 Bob</td><td>120</td><td class="no">No</td><td>0</td></tr>
        <tr><td>👩 Carol</td><td>140</td><td class="yes">Yes</td><td>1</td></tr>
        <tr><td>🧔 Dave</td><td>160</td><td class="yes">Yes</td><td>1</td></tr>
        <tr><td>👵 Eve</td><td>180</td><td class="yes">Yes</td><td>1</td></tr>
      </table>
      <p>This time we'll build a <strong>Random Forest with 3 trees</strong>. The key difference from XGBoost: each tree works <strong>independently</strong> — no residuals, no corrections, no sequence.</p>
    `
  },

  // 1 — WHAT IS BAGGING
  {
    label: "KEY IDEA",
    title: "What is bagging?",
    html: `
      <p><strong>Bagging = Bootstrap AGGregating</strong></p>
      <p>Instead of giving every tree the same data, each tree gets a <strong>random sample with replacement</strong> from the original data.</p>
      <div class="callout">
        <strong>"With replacement"</strong> means: after you randomly pick a patient, you put them back in the pool. So the same patient can be picked again. Some patients appear twice, some get left out entirely.
      </div>
      <p>Think of it like reaching into a hat with 5 names, pulling one out, writing it down, <strong>putting it back</strong>, and repeating 5 times.</p>
      <p>Each tree sees a <strong>slightly different version</strong> of the data. This is what makes the trees diverse — and diversity is what makes the forest powerful.</p>
    `
  },

  // 2 — BOOTSTRAP SAMPLE 1
  {
    label: "STEP 1",
    title: "Create a bootstrap sample for Tree 1",
    html: `
      <p>We randomly draw 5 patients <strong>with replacement</strong>. Here's what Tree 1 gets:</p>

      <p style="margin-bottom:8px"><strong>Drawing from the hat:</strong></p>
      <div class="bag-visual">
        <div class="bag-chip in-bag">🧑 Alice</div>
        <div class="bag-chip in-bag">🧑 Alice</div>
        <div class="bag-chip in-bag">👩 Carol</div>
        <div class="bag-chip in-bag">🧔 Dave</div>
        <div class="bag-chip in-bag">👵 Eve</div>
      </div>

      <div class="callout orange">
        <strong>Notice:</strong> Alice was picked TWICE (that's the "with replacement" part). Bob was never picked — he's left out of this tree entirely.
      </div>

      <p>Tree 1's training data:</p>
      <table>
        <tr><th>Row</th><th>Patient</th><th>BP</th><th>Label</th></tr>
        <tr class="picked"><td>1</td><td>🧑 Alice</td><td>110</td><td>0</td></tr>
        <tr class="picked"><td>2</td><td>🧑 Alice (again)</td><td>110</td><td>0</td></tr>
        <tr class="picked"><td>3</td><td>👩 Carol</td><td>140</td><td>1</td></tr>
        <tr class="picked"><td>4</td><td>🧔 Dave</td><td>160</td><td>1</td></tr>
        <tr class="picked"><td>5</td><td>👵 Eve</td><td>180</td><td>1</td></tr>
      </table>
    `
  },

  // 3 — TREE 1 TRAINS
  {
    label: "STEP 2",
    title: "Tree 1 trains on its bootstrap sample",
    html: `
      <p>Tree 1 sees its 5 rows and finds the best split — same process as any decision tree. Try every BP threshold, pick the one with lowest variance.</p>
      <p>It tries splitting and finds <strong>BP &lt; 130</strong> works best:</p>

      <div class="tree-wrap">
        <svg viewBox="0 0 460 180" width="460">
          <style>.t { font-family: 'IBM Plex Mono', monospace; text-anchor: middle; }</style>
          <rect x="145" y="8" width="170" height="36" rx="10" fill="#0f1b2e" stroke="#42a5f5" stroke-width="1.5"/>
          <text x="230" y="31" class="t" fill="#42a5f5" font-size="13" font-weight="600">BP &lt; 130 ?</text>
          <line x1="190" y1="44" x2="100" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <line x1="270" y1="44" x2="360" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <text x="135" y="65" class="t" fill="#5a6a80" font-size="10">YES</text>
          <text x="320" y="65" class="t" fill="#5a6a80" font-size="10">NO</text>

          <rect x="10" y="88" width="180" height="75" rx="10" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="1.5"/>
          <text x="100" y="115" class="t" fill="#66bb6a" font-size="16" font-weight="600">0 (No)</text>
          <text x="100" y="135" class="t" fill="#5a6a80" font-size="10">Alice ×2 → all 0s</text>
          <text x="100" y="150" class="t" fill="#5a6a80" font-size="9">predict: No Heart Attack</text>

          <rect x="270" y="88" width="180" height="75" rx="10" fill="rgba(239,83,80,0.06)" stroke="#ef5350" stroke-width="1.5"/>
          <text x="360" y="115" class="t" fill="#ef5350" font-size="16" font-weight="600">1 (Yes)</text>
          <text x="360" y="135" class="t" fill="#5a6a80" font-size="10">Carol, Dave, Eve → all 1s</text>
          <text x="360" y="150" class="t" fill="#5a6a80" font-size="9">predict: Heart Attack</text>
        </svg>
      </div>

      <div class="callout">
        <strong>Key difference from XGBoost:</strong> This tree predicts the <em>original label</em> (0 or 1), NOT residuals. It's a regular decision tree — no corrections, no boosting.
      </div>
    `
  },

  // 4 — BOOTSTRAP SAMPLE 2
  {
    label: "STEP 3",
    title: "Create a different bootstrap sample for Tree 2",
    html: `
      <p>Tree 2 gets its own <strong>independent random draw</strong>:</p>

      <div class="bag-visual">
        <div class="bag-chip in-bag">👨 Bob</div>
        <div class="bag-chip in-bag">👩 Carol</div>
        <div class="bag-chip in-bag">👩 Carol</div>
        <div class="bag-chip in-bag">🧔 Dave</div>
        <div class="bag-chip in-bag">👵 Eve</div>
      </div>

      <div class="callout orange">
        <strong>This time:</strong> Carol was picked twice. Alice was left out. Different random sample → the tree might learn slightly differently.
      </div>

      <table>
        <tr><th>Row</th><th>Patient</th><th>BP</th><th>Label</th></tr>
        <tr class="picked"><td>1</td><td>👨 Bob</td><td>120</td><td>0</td></tr>
        <tr class="picked"><td>2</td><td>👩 Carol</td><td>140</td><td>1</td></tr>
        <tr class="picked"><td>3</td><td>👩 Carol (again)</td><td>140</td><td>1</td></tr>
        <tr class="picked"><td>4</td><td>🧔 Dave</td><td>160</td><td>1</td></tr>
        <tr class="picked"><td>5</td><td>👵 Eve</td><td>180</td><td>1</td></tr>
      </table>

      <p>Tree 2 finds the best split on this data. It picks <strong>BP &lt; 130</strong> again:</p>

      <div class="tree-wrap">
        <svg viewBox="0 0 460 170" width="460">
          <style>.t { font-family: 'IBM Plex Mono', monospace; text-anchor: middle; }</style>
          <rect x="145" y="8" width="170" height="36" rx="10" fill="#0f1b2e" stroke="#ab82ff" stroke-width="1.5"/>
          <text x="230" y="31" class="t" fill="#ab82ff" font-size="13" font-weight="600">BP &lt; 130 ?</text>
          <line x1="190" y1="44" x2="100" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <line x1="270" y1="44" x2="360" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <text x="135" y="65" class="t" fill="#5a6a80" font-size="10">YES</text>
          <text x="320" y="65" class="t" fill="#5a6a80" font-size="10">NO</text>

          <rect x="10" y="88" width="180" height="65" rx="10" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="1.5"/>
          <text x="100" y="113" class="t" fill="#66bb6a" font-size="16" font-weight="600">0 (No)</text>
          <text x="100" y="133" class="t" fill="#5a6a80" font-size="10">Bob → 0</text>

          <rect x="270" y="88" width="180" height="65" rx="10" fill="rgba(239,83,80,0.06)" stroke="#ef5350" stroke-width="1.5"/>
          <text x="360" y="113" class="t" fill="#ef5350" font-size="16" font-weight="600">1 (Yes)</text>
          <text x="360" y="133" class="t" fill="#5a6a80" font-size="10">Carol ×2, Dave, Eve → all 1s</text>
        </svg>
      </div>
    `
  },

  // 5 — BOOTSTRAP SAMPLE 3
  {
    label: "STEP 4",
    title: "Tree 3 gets yet another bootstrap sample",
    html: `
      <p>One more independent random draw:</p>

      <div class="bag-visual">
        <div class="bag-chip in-bag">🧑 Alice</div>
        <div class="bag-chip in-bag">👨 Bob</div>
        <div class="bag-chip in-bag">👨 Bob</div>
        <div class="bag-chip in-bag">👩 Carol</div>
        <div class="bag-chip in-bag">🧔 Dave</div>
      </div>

      <div class="callout orange">
        <strong>This time:</strong> Bob appears twice. Eve is left out. And notice — the ratio of 0s to 1s is different in every sample. That's the whole point.
      </div>

      <table>
        <tr><th>Row</th><th>Patient</th><th>BP</th><th>Label</th></tr>
        <tr class="picked"><td>1</td><td>🧑 Alice</td><td>110</td><td>0</td></tr>
        <tr class="picked"><td>2</td><td>👨 Bob</td><td>120</td><td>0</td></tr>
        <tr class="picked"><td>3</td><td>👨 Bob (again)</td><td>120</td><td>0</td></tr>
        <tr class="picked"><td>4</td><td>👩 Carol</td><td>140</td><td>1</td></tr>
        <tr class="picked"><td>5</td><td>🧔 Dave</td><td>160</td><td>1</td></tr>
      </table>

      <p>Tree 3 also splits at <strong>BP &lt; 130</strong>:</p>

      <div class="tree-wrap">
        <svg viewBox="0 0 460 170" width="460">
          <style>.t { font-family: 'IBM Plex Mono', monospace; text-anchor: middle; }</style>
          <rect x="145" y="8" width="170" height="36" rx="10" fill="#0f1b2e" stroke="#ffa726" stroke-width="1.5"/>
          <text x="230" y="31" class="t" fill="#ffa726" font-size="13" font-weight="600">BP &lt; 130 ?</text>
          <line x1="190" y1="44" x2="100" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <line x1="270" y1="44" x2="360" y2="85" stroke="#1a2640" stroke-width="1.5"/>
          <text x="135" y="65" class="t" fill="#5a6a80" font-size="10">YES</text>
          <text x="320" y="65" class="t" fill="#5a6a80" font-size="10">NO</text>

          <rect x="10" y="88" width="180" height="65" rx="10" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="1.5"/>
          <text x="100" y="113" class="t" fill="#66bb6a" font-size="16" font-weight="600">0 (No)</text>
          <text x="100" y="133" class="t" fill="#5a6a80" font-size="10">Alice, Bob ×2 → all 0s</text>

          <rect x="270" y="88" width="180" height="65" rx="10" fill="rgba(239,83,80,0.06)" stroke="#ef5350" stroke-width="1.5"/>
          <text x="360" y="113" class="t" fill="#ef5350" font-size="16" font-weight="600">1 (Yes)</text>
          <text x="360" y="133" class="t" fill="#5a6a80" font-size="10">Carol, Dave → all 1s</text>
        </svg>
      </div>

      <p style="margin-top:14px">Now we have <strong>3 trained trees</strong>. Time to make predictions.</p>
    `
  },

  // 6 — PREDICTION TIME
  {
    label: "STEP 5",
    title: "Making predictions: run each patient through ALL 3 trees",
    html: `
      <p>Now for a prediction, we send each patient through <strong>every tree</strong> and collect the answers.</p>
      <p>Let's take <strong>🧑 Alice (BP = 110)</strong>:</p>

      <div class="trees-row">

      <div class="callout">
        <strong>With bagging:</strong> some trees won't even see that outlier (it gets left out of their bootstrap sample). So the outlier can only influence <em>some</em> trees, not all of them. When you vote, the reasonable trees outvote the one tree that overfitted to the outlier.
      </div>

      <p><strong>Each tree overfits a little differently</strong> because it sees different data. When you average their opinions, the individual mistakes cancel out.</p>

      <p>This is the same principle as "ask 100 people and take the average" — the <strong>wisdom of crowds</strong>.</p>

let currentStep = 0;

function render() {
  const step = STEPS[currentStep];
  const total = STEPS.length;

  let pips = '';
  for (let i = 0; i < total; i++) {
    let cls = 'progress-pip';
    if (i < currentStep) cls += ' done';
    if (i === currentStep) cls += ' current';
    pips += `<div class="${cls}"></div>`;
  }
  document.getElementById('progressBar').innerHTML = pips;

  document.getElementById('stepContent').innerHTML = `
    <div class="step-card">
      <div class="step-label">${step.label}</div>
      <h2>${step.title}</h2>
      ${step.html}
    </div>
  `;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === total - 1;
  document.getElementById('btnNext').textContent = currentStep === total - 1 ? 'Done ✓' : 'Next →';
  document.getElementById('stepCount').textContent = `${currentStep + 1} / ${total}`;
}

function goNext() {
  if (currentStep < STEPS.length - 1) { currentStep++; render(); window.scrollTo(0, 0); }
}

function goBack() {
  if (currentStep > 0) { currentStep--; render(); window.scrollTo(0, 0); }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft') goBack();
});

render();
</script>
