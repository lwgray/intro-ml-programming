
<style>
  .ctrl { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px; color:var(--color-text-secondary); }
  .ctrl input[type=range] { flex:1; }
  .ctrl span { min-width:28px; font-weight:500; font-size:13px; color:var(--color-text-primary); }
  canvas { width:100%; display:block; }
  .legend { display:flex; gap:20px; margin:10px 0 4px; font-size:12px; color:var(--color-text-secondary); }
  .leg-item { display:flex; align-items:center; gap:6px; }
  .leg-dot { width:24px; height:3px; border-radius:2px; }
</style>

<div class="ctrl">
  <label>Neurons</label>
  <input type="range" id="nSlider" min="1" max="20" value="3" step="1">
  <span id="nVal">3</span>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div> target: sin(x)</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div> ReLU approximation</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(239,159,39,0.4)"></div> individual neurons</div>
</div>

<canvas id="mainCanvas" height="260"></canvas>

<div style="margin-top:14px; border-top:0.5px solid var(--color-border-tertiary); padding-top:12px;">
  <canvas id="reluCanvas" height="110"></canvas>
  <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px;text-align:center;">A single ReLU unit — flat then linear. Each neuron fires at a different threshold.</div>
</div>

<script>
const nSlider = document.getElementById('nSlider');
const nVal = document.getElementById('nVal');
const mainCanvas = document.getElementById('mainCanvas');
const reluCanvas = document.getElementById('reluCanvas');
const mCtx = mainCanvas.getContext('2d');
const rCtx = reluCanvas.getContext('2d');

function getCSSVar(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

const X_MIN = -Math.PI * 1.5;
const X_MAX = Math.PI * 1.5;
const N_POINTS = 400;

function linspace(a, b, n) {
  const arr = [];
  for (let i = 0; i < n; i++) arr.push(a + (b - a) * i / (n - 1));
  return arr;
}

function relu(x) { return Math.max(0, x); }

function fitNeurons(n) {
  const xs = linspace(X_MIN, X_MAX, 200);
  const ys = xs.map(x => Math.sin(x));

  const thresholds = linspace(X_MIN * 0.9, X_MAX * 0.9, n);
  const slopes = [];
  for (let i = 0; i < n; i++) slopes.push((i % 2 === 0 ? 1 : -1) * (0.5 + Math.random() * 0.5));

  const features = xs.map(x => thresholds.map(t => relu(x - t)));

  const A = features;
  const b = ys;
  let weights = new Array(n).fill(0);
  const lr = 0.01;
  for (let iter = 0; iter < 800; iter++) {
    const preds = A.map(row => row.reduce((s, v, j) => s + v * weights[j], 0));
    const grads = new Array(n).fill(0);
    for (let i = 0; i < xs.length; i++) {
      const err = preds[i] - b[i];
      for (let j = 0; j < n; j++) grads[j] += err * A[i][j];
    }
    for (let j = 0; j < n; j++) weights[j] -= lr * grads[j] / xs.length;
  }

  return { thresholds, weights };
}

function approx(x, thresholds, weights) {
  return thresholds.reduce((s, t, j) => s + weights[j] * relu(x - t), 0);
}

function drawMain(n) {
  const dpr = window.devicePixelRatio || 1;
  const W = mainCanvas.offsetWidth;
  const H = 260;
  mainCanvas.width = W * dpr;
  mainCanvas.height = H * dpr;
  mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const { thresholds, weights } = fitNeurons(n);
  const xs = linspace(X_MIN, X_MAX, N_POINTS);

  const textPrimary = getCSSVar('--color-text-primary') || '#1a1a18';
  const textSecondary = getCSSVar('--color-text-secondary') || '#5f5e5a';
  const borderColor = getCSSVar('--color-border-tertiary') || 'rgba(0,0,0,0.12)';

  const PAD = { top: 20, bottom: 32, left: 36, right: 16 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  const xToP = x => PAD.left + (x - X_MIN) / (X_MAX - X_MIN) * cW;
  const yToP = y => PAD.top + (1 - (y + 1.4) / 2.8) * cH;

  mCtx.clearRect(0, 0, W, H);

  mCtx.strokeStyle = borderColor;
  mCtx.lineWidth = 0.5;
  mCtx.beginPath();
  mCtx.moveTo(PAD.left, yToP(0)); mCtx.lineTo(PAD.left + cW, yToP(0));
  mCtx.moveTo(xToP(0), PAD.top); mCtx.lineTo(xToP(0), PAD.top + cH);
  mCtx.stroke();

  const tickVals = [-Math.PI, -Math.PI/2, 0, Math.PI/2, Math.PI];
  const tickLabels = ['-π', '-π/2', '0', 'π/2', 'π'];
  mCtx.fillStyle = textSecondary;
  mCtx.font = '11px sans-serif';
  mCtx.textAlign = 'center';
  tickVals.forEach((v, i) => {
    const px = xToP(v);
    mCtx.beginPath();
    mCtx.strokeStyle = borderColor;
    mCtx.lineWidth = 0.5;
    mCtx.moveTo(px, yToP(0) - 3); mCtx.lineTo(px, yToP(0) + 3);
    mCtx.stroke();
    mCtx.fillText(tickLabels[i], px, yToP(0) + 14);
  });

  [-1, 1].forEach(v => {
    mCtx.fillStyle = textSecondary;
    mCtx.textAlign = 'right';
    mCtx.fillText(v, PAD.left - 4, yToP(v) + 4);
  });

  if (n <= 12) {
    thresholds.forEach(t => {
      const neuronXs = linspace(X_MIN, X_MAX, 200);
      mCtx.strokeStyle = 'rgba(239,159,39,0.25)';
      mCtx.lineWidth = 1;
      mCtx.beginPath();
      neuronXs.forEach((x, i) => {
        const py = yToP(approx(x, [t], [weights[thresholds.indexOf(t)]]));
        const clampedY = Math.max(PAD.top, Math.min(PAD.top + cH, py));
        i === 0 ? mCtx.moveTo(xToP(x), clampedY) : mCtx.lineTo(xToP(x), clampedY);
      });
      mCtx.stroke();
    });
  }

  mCtx.strokeStyle = '#7F77DD';
  mCtx.lineWidth = 2;
  mCtx.setLineDash([5, 4]);
  mCtx.beginPath();
  xs.forEach((x, i) => {
    const py = yToP(Math.sin(x));
    i === 0 ? mCtx.moveTo(xToP(x), py) : mCtx.lineTo(xToP(x), py);
  });
  mCtx.stroke();
  mCtx.setLineDash([]);

  mCtx.strokeStyle = '#1D9E75';
  mCtx.lineWidth = 2.5;
  mCtx.beginPath();
  xs.forEach((x, i) => {
    const py = yToP(approx(x, thresholds, weights));
    const clampedY = Math.max(PAD.top, Math.min(PAD.top + cH, py));
    i === 0 ? mCtx.moveTo(xToP(x), clampedY) : mCtx.lineTo(xToP(x), clampedY);
  });
  mCtx.stroke();

  const sinYs = xs.map(x => Math.sin(x));
  const approxYs = xs.map(x => approx(x, thresholds, weights));
  const mse = sinYs.reduce((s, y, i) => s + (y - approxYs[i]) ** 2, 0) / sinYs.length;

  mCtx.fillStyle = textSecondary;
  mCtx.font = '11px sans-serif';
  mCtx.textAlign = 'left';
  mCtx.fillText('error: ' + mse.toFixed(4), PAD.left + 4, PAD.top + 14);
}

function drawRelu() {
  const dpr = window.devicePixelRatio || 1;
  const W = reluCanvas.offsetWidth;
  const H = 110;
  reluCanvas.width = W * dpr;
  reluCanvas.height = H * dpr;
  rCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const borderColor = getCSSVar('--color-border-tertiary') || 'rgba(0,0,0,0.12)';
  const textSecondary = getCSSVar('--color-text-secondary') || '#5f5e5a';

  const PAD = { top: 14, bottom: 24, left: 36, right: 16 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  const xMin = -2, xMax = 2;
  const yMin = -0.3, yMax = 1.5;

  const xToP = x => PAD.left + (x - xMin) / (xMax - xMin) * cW;
  const yToP = y => PAD.top + (1 - (y - yMin) / (yMax - yMin)) * cH;

  rCtx.clearRect(0, 0, W, H);

  rCtx.strokeStyle = borderColor;
  rCtx.lineWidth = 0.5;
  rCtx.beginPath();
  rCtx.moveTo(PAD.left, yToP(0)); rCtx.lineTo(PAD.left + cW, yToP(0));
  rCtx.moveTo(xToP(0), PAD.top); rCtx.lineTo(xToP(0), PAD.top + cH);
  rCtx.stroke();

  rCtx.strokeStyle = '#7F77DD';
  rCtx.lineWidth = 2;
  rCtx.beginPath();
  rCtx.moveTo(xToP(xMin), yToP(0));
  rCtx.lineTo(xToP(0), yToP(0));
  rCtx.lineTo(xToP(xMax), yToP(xMax));
  rCtx.stroke();

  rCtx.fillStyle = '#7F77DD';
  rCtx.beginPath();
  rCtx.arc(xToP(0), yToP(0), 4, 0, Math.PI * 2);
  rCtx.fill();

  rCtx.fillStyle = textSecondary;
  rCtx.font = '11px sans-serif';
  rCtx.textAlign = 'center';
  rCtx.fillText('threshold', xToP(0), yToP(0) + 16);

  rCtx.textAlign = 'left';
  rCtx.fillText('flat (no activation)', xToP(xMin + 0.05), yToP(0) - 5);
  rCtx.fillText('linear ramp', xToP(0.5), yToP(0.6));

  rCtx.fillStyle = textSecondary;
  rCtx.textAlign = 'center';
  rCtx.fillText('relu(x) = max(0, x)', W / 2, H - 4);
}

function redraw() {
  const n = parseInt(nSlider.value);
  nVal.textContent = n;
  drawMain(n);
}

nSlider.addEventListener('input', redraw);

setTimeout(() => {
  drawRelu();
  redraw();
}, 80);

window.addEventListener('resize', () => { drawRelu(); redraw(); });
</script>
