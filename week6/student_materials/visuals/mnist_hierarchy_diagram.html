<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNIST Hierarchy Diagram</title>
<style>
  :root {
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-border-secondary: #b4b2a9;
    --color-background-primary: #ffffff;
    --font-sans: system-ui, sans-serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-border-secondary: #444441;
      --color-background-primary: #1c1c1a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    width: 100%;
    max-width: 720px;
    background: var(--color-background-primary);
    border: 1px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
  }
  h1 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: var(--color-text-primary);
  }
  p.sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1rem;
  }

  /* SVG class system */
  svg text { font-family: var(--font-sans); fill: var(--color-text-primary); }
  svg text.t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  svg text.th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  svg text.ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }

  svg .arr { stroke: var(--color-border-secondary); stroke-width: 1.5; fill: none; }
  svg .leader { stroke: var(--color-text-secondary); stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }
  svg .box { fill: #f1efe8; stroke: #b4b2a9; }
  @media (prefers-color-scheme: dark) {
    svg .box { fill: #2c2c2a; stroke: #444441; }
  }

  /* Color ramps */
  svg .c-purple rect, svg .c-purple circle, svg .c-purple ellipse {
    fill: #EEEDFE; stroke: #534AB7;
  }
  svg .c-purple .th { fill: #3C3489; }
  svg .c-purple .ts { fill: #534AB7; }
  svg .c-teal rect, svg .c-teal circle, svg .c-teal ellipse {
    fill: #E1F5EE; stroke: #0F6E56;
  }
  svg .c-teal .th { fill: #085041; }
  svg .c-teal .ts { fill: #0F6E56; }
  svg .c-amber rect, svg .c-amber circle, svg .c-amber ellipse {
    fill: #FAEEDA; stroke: #854F0B;
  }
  svg .c-amber .th { fill: #633806; }
  svg .c-amber .ts { fill: #854F0B; }

  @media (prefers-color-scheme: dark) {
    svg .c-purple rect, svg .c-purple circle, svg .c-purple ellipse {
      fill: #3C3489; stroke: #AFA9EC;
    }
    svg .c-purple .th { fill: #EEEDFE; }
    svg .c-purple .ts { fill: #CECBF6; }
    svg .c-teal rect, svg .c-teal circle, svg .c-teal ellipse {
      fill: #085041; stroke: #5DCAA5;
    }
    svg .c-teal .th { fill: #E1F5EE; }
    svg .c-teal .ts { fill: #9FE1CB; }
    svg .c-amber rect, svg .c-amber circle, svg .c-amber ellipse {
      fill: #633806; stroke: #EF9F27;
    }
    svg .c-amber .th { fill: #FAEEDA; }
    svg .c-amber .ts { fill: #FAC775; }
  }

  svg .node { cursor: pointer; }
  svg .node:hover { opacity: 0.85; }

  /* bottom arrow line color */
  svg line.bottom-arr { stroke: var(--color-border-secondary); }
</style>
</head>
<body>
<div class="card">
  <h1>MNIST Hierarchical Feature Learning</h1>
  <p class="sub">How the digit "9" is recognized layer by layer — from raw pixels to small edges to whole shapes.</p>

<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Column headers -->
<text class="th" x="100" y="30" text-anchor="middle">Input</text>
<text class="th" x="270" y="30" text-anchor="middle">Layer 1</text>
<text class="th" x="440" y="30" text-anchor="middle">Layer 2</text>
<text class="th" x="600" y="30" text-anchor="middle">Output</text>

<text class="ts" x="270" y="48" text-anchor="middle">small edges &amp; curves</text>
<text class="ts" x="440" y="48" text-anchor="middle">loops, lines, arcs</text>

  <rect x="30" y="0"  width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="40" y="0"  width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>

  <rect x="20" y="11" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
  <rect x="30" y="11" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="40" y="11" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>

  <rect x="0"  y="22" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
  <rect x="10" y="22" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="20" y="22" width="9" height="9" rx="1" fill="currentColor" opacity="0.9"/>
  <rect x="30" y="22" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="40" y="22" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>

  <rect x="0"  y="33" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>

  <rect x="30" y="33" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="40" y="33" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>

  <rect x="0"  y="44" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
  <rect x="10" y="44" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
  <rect x="20" y="44" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
  <rect x="30" y="44" width="9" height="9" rx="1" fill="currentColor" opacity="0.85"/>
  <rect x="40" y="44" width="9" height="9" rx="1" fill="currentColor" opacity="0.15"/>
</g>
<text class="ts" x="100" y="140" text-anchor="middle">raw pixel values</text>
<text class="ts" x="100" y="154" text-anchor="middle">784 numbers</text>

<!-- LAYER 1 features -->
<g class="node">
  <g class="c-purple">
    <rect x="202" y="68" width="136" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="89" text-anchor="middle" dominant-baseline="central">Horizontal edge</text>
  </g>
  <line x1="220" y1="108" x2="320" y2="108" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
</g>

<g class="node">
  <g class="c-purple">
    <rect x="202" y="136" width="136" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="157" text-anchor="middle" dominant-baseline="central">Vertical edge</text>
  </g>
  <line x1="270" y1="174" x2="270" y2="178" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
</g>

<g class="node">
  <g class="c-purple">
    <rect x="202" y="204" width="136" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="225" text-anchor="middle" dominant-baseline="central">Diagonal edge</text>
  </g>
  <line x1="220" y1="242" x2="320" y2="230" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
</g>

<g class="node">
  <g class="c-purple">
    <rect x="202" y="272" width="136" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="293" text-anchor="middle" dominant-baseline="central">Short curve</text>
  </g>
  <path d="M230 308 Q270 298 310 308" fill="none" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
</g>

<text class="ts" x="270" y="350" text-anchor="middle">small receptive field</text>
<text class="ts" x="270" y="365" text-anchor="middle">~5×5 pixels each</text>

<!-- LAYER 2 features -->
<g class="node">
  <g class="c-teal">
    <rect x="372" y="100" width="136" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="440" y="121" text-anchor="middle" dominant-baseline="central">Circular loop</text>
    <text class="ts" x="440" y="141" text-anchor="middle" dominant-baseline="central">top of the "9"</text>
  </g>
  <ellipse cx="440" cy="147" rx="10" ry="7" fill="none" stroke="#0F6E56" stroke-width="1.5"/>
</g>

<g class="node">
  <g class="c-teal">
    <rect x="372" y="216" width="136" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="440" y="237" text-anchor="middle" dominant-baseline="central">Descending line</text>
    <text class="ts" x="440" y="257" text-anchor="middle" dominant-baseline="central">tail of the "9"</text>
  </g>
</g>

<text class="ts" x="440" y="320" text-anchor="middle">large receptive field</text>
<text class="ts" x="440" y="335" text-anchor="middle">~15×15 pixels each</text>

<!-- OUTPUT -->
<g class="node">
  <g class="c-amber">
    <rect x="552" y="148" width="96" height="56" rx="8" stroke-width="1"/>
    <text class="th" x="600" y="169" text-anchor="middle" dominant-baseline="central">Digit "9"</text>
    <text class="ts" x="600" y="189" text-anchor="middle" dominant-baseline="central">98.4% confidence</text>
  </g>
</g>

<!-- ARROWS: Input → Layer 1 -->
<line x1="150" y1="100" x2="200" y2="94" class="arr" marker-end="url(#arrow)"/>
<line x1="150" y1="110" x2="200" y2="162" class="arr" marker-end="url(#arrow)"/>

<line x1="150" y1="118" x2="200" y2="298" class="arr" marker-end="url(#arrow)"/>

<!-- ARROWS: Layer 1 → Layer 2 loop -->
<path d="M338 94 C360 94 360 128 370 128" fill="none" stroke="#9FE1CB" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M338 162 C358 162 358 140 370 138" fill="none" stroke="#9FE1CB" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M338 230 C355 230 355 148 370 150" fill="none" stroke="#9FE1CB" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M338 298 C355 298 355 160 370 160" fill="none" stroke="#9FE1CB" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ARROWS: Layer 1 → Layer 2 descender -->
<path d="M338 94 C358 94 360 240 370 240" fill="none" stroke="#9FE1CB" stroke-width="0.7" opacity="0.5" marker-end="url(#arrow)"/>
<path d="M338 162 C356 162 357 244 370 244" fill="none" stroke="#9FE1CB" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M338 230 C354 230 354 248 370 248" fill="none" stroke="#9FE1CB" stroke-width="0.8" opacity="0.5" marker-end="url(#arrow)"/>

<!-- ARROWS: Layer 2 → Output -->
<path d="M508 128 C530 128 530 176 550 176" fill="none" stroke="#FAC775" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M508 244 C530 244 530 188 550 188" fill="none" stroke="#FAC775" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Bottom summary -->
<text class="ts" x="340" y="400" text-anchor="middle">Receptive field grows with depth → bigger patterns become detectable</text>

<line x1="100" y1="420" x2="600" y2="420" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="438" text-anchor="middle">pixels</text>
<text class="ts" x="270" y="438" text-anchor="middle">edges &amp; curves</text>
<text class="ts" x="440" y="438" text-anchor="middle">shapes &amp; parts</text>
<text class="ts" x="600" y="438" text-anchor="middle">digit</text>

<text class="ts" x="340" y="470" text-anchor="middle">increasing abstraction →</text>

</svg>
</div>
</body>
</html>
