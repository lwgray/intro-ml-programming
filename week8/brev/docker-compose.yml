name: &week-name week8

x-config:
  image: &image ghcr.io/lwgray/intro-ml-vision:latest
  working-dir: &working-dir /intro-ml-programming/week8/student_materials
  default-jupyter-url: &default-jupyter-url ["/lab/tree/intro-ml-programming/week8/student_materials/day1_live_session/week8_live_session.ipynb?file-browser-path=/intro-ml-programming/week8/student_materials"]
  gpu-config: &gpu-config
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  common-env: &common-env
    BREV_ENV_ID: ${BREV_ENV_ID:-}
    IML_WEEK: *week-name
    IML_RUN_TESTS: ${IML_RUN_TESTS:-}
    IML_TEST_ARGS: ${IML_TEST_ARGS:-}
    IML_USER: ${IML_USER:-student}
    IML_UID: ${IML_UID:-1000}
    IML_GID: ${IML_GID:-1000}
  common-service: &common-service
    pull_policy: missing
    volumes:
      - intro-ml-programming:/intro-ml-programming
    environment: *common-env
    user: root
    working_dir: *working-dir

services:
  base:
    <<: [*gpu-config, *common-service]
    image: *image
    entrypoint: ["/intro-ml-programming/brev/entrypoint.bash", "base"]
    build:
      context: ../..
      dockerfile: brev/images/dockerfile
      target: vision
    restart: "no"
  jupyter:
    <<: [*gpu-config, *common-service]
    image: *image
    entrypoint: ["/intro-ml-programming/brev/entrypoint.bash", "jupyter"]
    command: *default-jupyter-url
    depends_on:
      base:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "0.0.0.0:8888:8888" # JupyterLab

volumes:
  intro-ml-programming:
